      - type: list
        id: achievements
        title: Selected Publications
        icon: scroll
        data:
          - |-
            [Zhi-Guang Lu, Guo-Qing Tian, Xin-You Lü, and ==Cheng Shang==, _Topological Quantum Batteries_, **Phys. Rev. Lett.** **134**, 180401 (2025).](https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.134.180401){.plain}

            This work was featured in [PRL Trending](https://x.com/PhysRevLett/status/1924474721149542443), highlighted in a Press Release by [RIKEN](https://www.riken.jp/en/news_pubs/research_news/pr/2025/20250513_2/index.html), and presented as an Invited Talk at the [21st International Workshop on Pseudo-Hermitian Hamiltonians in Quantum Physics (PHHQP-XXI)](https://events.physics.uoc.gr/event/1/page/5-speakers), Chania, Greece. As of March 2026, this study has 86 citations on Google Scholar. {.desc}

          - |-
            [==Cheng Shang== and Hong-Chao Li, _Resonance-dominant optomechanical entanglement in open quantum systems_, **Physical Review Applied** **21**(4), 044048 (2024).](https://journals.aps.org/prapplied/abstract/10.1103/PhysRevApplied.21.044048){.plain}

            This work was an Independent Research project conducted by only two graduate students. As of March 2026, this study has 22 citations on Google Scholar. {.desc}

          - |-
            [Hongchao Li, ==Cheng Shang==, Tomotaka Kuwahara, and Tan Van Vu, _Macroscopic Particle Transport in Dissipative Long-Range Bosonic Systems_, **Nature Communications (2026)**](https://doi.org/10.1038/s41467-026-70881-7){.plain}

            Significant progress has been made in establishing limits on quantum transport in closed systems, but extensions to open many-body systems remain scarce. We develop the general optimal transport theory and find the maximal speed of macroscopic particle transport in dissipative long-range bosonic systems. {.desc}

          - |-
            [==Cheng Shang==, Hong-Zhi Shen, and Xue-Xi Yi, _Nonreciprocity in a strongly coupled three-mode optomechanical circulatory system_, **Optics Express** **27**(18), 25882–25901 (2019).](https://opg.optica.org/oe/fulltext.cfm?uri=oe-27-18-25882&id=417227){.plain}

            As of March 2026, this work has received 35 citations on Google Scholar. {.desc}

          - |-
            [Hong-Zhi Shen, ==Cheng Shang==, Y. H. Zhou, and Xue-Xi Yi, _Unconventional single-photon blockade in non-Markovian systems_, **Phys. Rev. A** **98**(2), 023856 (2018).](https://journals.aps.org/pra/abstract/10.1103/PhysRevA.98.023856){.plain}

            As of March 2026, this work has received 98 citations on Google Scholar. {.desc}

          - |-
            [Zhi-Guang Lu, ==Cheng Shang==, Ying Wu, and Xin-You Lü, _Analytical approach to higher-order correlation functions in U(1) symmetric systems_, **Phys. Rev. A** **108**, 053703 (2023).](https://journals.aps.org/pra/abstract/10.1103/PhysRevA.108.053703){.plain}

            This work developed a user-friendly open-source library in Python known as the [Quantum Correlation Solver](https://github.com/ZhiGuangLu/qcs). {.desc}

          - |-
            [==Cheng Shang== and H. Z. Shen, _Coupling Enhancement and Symmetrization in Dissipative Optomechanical Systems_, **Annalen der Physik** **538**, e00606 (2026).](https://onlinelibrary.wiley.com/doi/10.1002/andp.202500606){.plain}

            An invited contribution to _Annalen der Physik_. {.desc}

      - type: list
        id: preprints
        title: Selected Preprints
        icon: clock-rotate-left
        data:
          - |-
            [==Cheng Shang==, Zhi-Guang Lu, Hayato Kinkawa, and Tomotaka Kuwahara, _Operator Spreading and Information Propagation: Equivalence and Beyond_, **arXiv**:2505.07955.](https://arxiv.org/abs/2505.07955){.plain}

            This work received the [Best Poster Award](http://en.baqis.ac.cn/news/detail/?cid=1764) at the 5th International Symposium on Quantum Physics and Quantum Information Sciences (QPQIS-2023), Beijing, China. This work is currently under review at _PRA Letter_. {.desc}

          - |-
            [Donghoon Kim, Yusuke Kimura, Hugo Mackay, Yosuke Mitsuhashi, Hideaki Nishikawa, Carla Rubiliani, ==Cheng Shang== _(Authors are listed in alphabetical order)_, Ayumi Ukai, and Tomotaka Kuwahara, _Spectral Small-Incremental-Entangling: Breaking Quasi-Polynomial Complexity Barriers in Long-Range Interacting Systems_, **arXiv**:2509.12014.](https://arxiv.org/abs/2509.12014){.plain}

            This work, an International Collaboration across Asia, Europe, and the U. S., introduces the concept of spectral entangling strength (SIE), which captures the structural entangling power of an operator, and establishes a spectral SIE theorem. This manuscript is currently under review at _Physical Review X_. {.desc}

          - |-
            [Rohit Kumar Shukla and ==Cheng Shang==, _Many-Body Structural Effects in Periodically Driven Quantum Batteries_, **arXiv**:2603.03883.](https://arxiv.org/abs/2603.03883){.plain}

            This work study how many-body structure affects charging optimization under a periodic driving protocol, showing that integrability breaking and long-range interactions serve as key points for improving the QBs charging performance.{.desc}

          - |-
            [H. Z. Shen, X. C. Zhang, L. Y. Ning, Zhi-Guang Lu, Yan-Hui Zhou, and ==Cheng Shang==, _Higher-order Exceptional Points Induced by Non-Markovian Environments_, **arXiv**:2504.00617.](https://arxiv.org/abs/2504.00617){.plain}

            This work is currently under review at _Laser & Photonics Reviews_. {.desc}

      - type: list
        id: interests
        title: Research Interests
        icon: flask
        dot: check
        data:
          - text: "**Lieb-Robinson Bound and Its Application**: one may include Particle Transport, Information Propagation, Operator Spreading, and Correlation Generation."
            icon: ph:arrows-out-bold
          - text: "**Open Quantum Systems**: with particular focus on Dissipative and non-Markovian Dynamics in Quantum Optics and Quantum Information."
            icon: ph:atom-bold
          - text: "**Quantum Batteries**: focuses on improving the performance of Quantum Batteries by addressing theoretical barriers in practical applications, including those in Topological few-body and Many-Body Quantum Systems."
            icon: ph:battery-charging-vertical-bold
          - text: "**Hybrid Cavity Optomechanics**: theoretical exploration of nonlinear radiation-pressure-induced phenomena and their integration with Superconducting Circuit platforms."
            icon: ph:circuitry-bold


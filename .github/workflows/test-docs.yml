name: Test Docs

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Copy Config
        if: github.repository == 'Mister-Hope/portfolio-template'
        run: |-
          cp examples/config.example.yml config.yml

      - name: Build Docs
        run: |-
          pnpm run build
